# Example: add inside your server { } block for advancesafe.in (HTTPS).
# Align values with vercel.json / public/_headers — adjust CSP if you add new third parties.

add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), browsing-topics=(), payment=(), interest-cohort=()" always;
add_header X-XSS-Protection "1; mode=block" always;
# Single line CSP — copy the Content-Security-Policy value from vercel.json
